name: Supabase Backup (Simple)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Supabase CLI
        run: |
          curl -fsSL -o supabase.deb \
            https://github.com/supabase/cli/releases/download/v2.78.1/supabase_2.78.1_linux_amd64.deb
          sudo dpkg -i supabase.deb

      - name: Verify Supabase CLI
        run: supabase --version

      - name: Set timestamp
        run: |
          TS=$(date +"%Y-%m-%d_%H-%M-%S")
          echo "TS=$TS" >> $GITHUB_ENV

      - name: Dump database
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
          supabase db dump --file "supabase-$TS.sql"

      - name: Compress backup
        run: |
          tar -czf "supabase-$TS.tar.gz" "supabase-$TS.sql"

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Restore rclone config
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Upload backup to Google Drive
        run: |
          DEST="${{ secrets.GDRIVE_FOLDER }}"
          if [ -z "$DEST" ]; then DEST="supabase-backups"; fi
          rclone copy "supabase-$TS.tar.gz" "gdrive:$DEST"
