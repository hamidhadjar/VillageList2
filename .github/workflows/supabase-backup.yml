name: Supabase Backup (Full)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Supabase CLI
        run: |
          curl -fsSL -o supabase.deb \
            https://github.com/supabase/cli/releases/download/v2.78.1/supabase_2.78.1_linux_amd64.deb
          sudo dpkg -i supabase.deb

      - name: Verify Supabase CLI
        run: supabase --version

      - name: Set timestamp
        run: |
          TS=$(date +"%Y-%m-%d_%H-%M-%S")
          echo "TS=$TS" >> $GITHUB_ENV
          mkdir -p "backup-$TS"

      - name: Link project
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

      - name: Dump roles
        run: |
          supabase db dump --role-only --file "backup-$TS/roles.sql"

      - name: Dump public schema
        run: |
          supabase db dump --schema public --file "backup-$TS/schema_public.sql"

      - name: Dump public data
        run: |
          supabase db dump --data-only --use-copy --schema public --file "backup-$TS/data_public.sql"

      - name: Dump migrations
        run: |
          supabase db dump --schema supabase_migrations --file "backup-$TS/schema_migrations.sql"
          supabase db dump --data-only --use-copy --schema supabase_migrations --file "backup-$TS/data_migrations.sql"

      - name: Optional auth schema
        run: |
          supabase db dump --schema auth --file "backup-$TS/schema_auth.sql" || true

      - name: Optional storage schema
        run: |
          supabase db dump --schema storage --file "backup-$TS/schema_storage.sql" || true

      - name: Create README
        run: |
          cat > "backup-$TS/README.txt" <<'EOF'
          Supabase backup contents:
          - roles
          - public schema + data
          - migrations
          - optional auth/storage schema

          NOTE:
          Storage bucket FILES are NOT included.
          EOF

      - name: Compress backup
        run: |
          tar -czf "supabase-backup-$TS.tar.gz" "backup-$TS"

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Restore rclone config
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Upload to Google Drive
        run: |
          DEST="${{ secrets.GDRIVE_FOLDER }}"
          if [ -z "$DEST" ]; then DEST="supabase-backups"; fi
          rclone copy "supabase-backup-$TS.tar.gz" "gdrive:$DEST"
