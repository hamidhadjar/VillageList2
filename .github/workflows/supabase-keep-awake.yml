# Prevents Supabase free-tier project from pausing after 7 days of inactivity
# by pinging the database twice a week. Uses ~2 min/month of GitHub Actions.
name: Supabase keep awake

on:
  schedule:
    # Mon 06:00 UTC, Thu 06:00 UTC (run twice per week)
    - cron: '0 6 * * 1'
    - cron: '0 6 * * 4'
  workflow_dispatch: # allow manual run from Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          URL="${{ secrets.SUPABASE_URL }}"
          KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          if [ -z "$URL" ] || [ -z "$KEY" ]; then
            echo "::warning::Add SUPABASE_URL and SUPABASE_ANON_KEY as repo secrets (Settings → Secrets and variables → Actions)."
            exit 0
          fi
          # Minimal REST query so Supabase registers activity (use a table that exists)
          RES=$(curl -s -o /dev/null -w "%{http_code}" \
            "${URL}/rest/v1/biographies?select=id&limit=1" \
            -H "apikey: ${KEY}" -H "Authorization: Bearer ${KEY}" -H "Accept: application/json")
          if [ "$RES" = "200" ] || [ "$RES" = "406" ]; then
            echo "Supabase ping OK (HTTP $RES)"
          else
            echo "::warning::Supabase returned HTTP $RES. If you use another table, edit this workflow and change 'biographies' in the URL."
          fi
